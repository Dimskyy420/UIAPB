name: tasuru_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  google_sign_in: ^6.2.1
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: DMSans
      fonts:
        - asset: fonts/DMSans_18pt-Regular.ttf
        - asset: fonts/DMSans_18pt-Medium.ttf
          weight: 500
        - asset: fonts/DMSans_18pt-SemiBold.ttf
          weight: 600
        - asset: fonts/DMSans_18pt-Bold.ttf
          weight: 700